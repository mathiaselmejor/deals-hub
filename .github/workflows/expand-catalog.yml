name: Expand catalog (transparent batches)

on:
  schedule:
    # Diario 04:00 UTC — nuevo lote + ASINs + mantenimiento
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      generate:
        description: "Generar siguiente lote si falta"
        type: boolean
        default: true
      asin_batch:
        description: "ASINs a resolver por ejecución"
        type: string
        default: "200"

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          npm ci
          pip install playwright
          python -m playwright install chromium

      - name: Expand catalog
        env:
          CATALOG_TARGET: "10000"
          ASIN_BATCH: ${{ inputs.asin_batch || '200' }}
        run: |
          if [ "${{ inputs.generate }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            node scripts/expand-catalog.mjs --generate
          else
            node scripts/expand-catalog.mjs
          fi

      - name: Commit catalog updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ scripts/lib/catalog-8-seeds.mjs 2>/dev/null || true
          git add data/
          if git diff --staged --quiet; then
            echo "No catalog changes"
            exit 0
          fi
          git commit -m "chore: expand catalog (transparent pricing + ASINs)"
          git push
