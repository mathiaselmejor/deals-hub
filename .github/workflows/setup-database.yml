name: Setup Supabase (SQL)

on:
  workflow_dispatch:

jobs:
  apply-sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply referrals + features SQL
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Añade SUPABASE_ACCESS_TOKEN en GitHub Secrets (token de supabase.com/dashboard/account/tokens)"
            exit 1
          fi
          for f in supabase/user-features.sql supabase/referrals.sql supabase/fix-rls.sql; do
            echo "Applying $f..."
            curl -fsS -X POST \
              "https://api.supabase.com/v1/projects/xawuoysscwpkzwhkxruu/database/query" \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg q "$(cat "$f")" '{query: $q}')"
          done
          echo "SQL applied."
